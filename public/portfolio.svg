<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <style>
      @keyframes shake {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        10% { transform: translate(-1.5px, 1px) rotate(-0.5deg); }
        20% { transform: translate(1.5px, -1px) rotate(0.5deg); }
        30% { transform: translate(-1px, -1.5px) rotate(-0.3deg); }
        40% { transform: translate(1px, 1.5px) rotate(0.3deg); }
        50% { transform: translate(-1.5px, -0.5px) rotate(-0.4deg); }
        60% { transform: translate(1.5px, 0.5px) rotate(0.4deg); }
        70% { transform: translate(-0.5px, 1.5px) rotate(-0.2deg); }
        80% { transform: translate(0.5px, -1.5px) rotate(0.2deg); }
        90% { transform: translate(-1px, 0.5px) rotate(-0.3deg); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes floatCode {
        0% { opacity: 0; transform: translateY(0); }
        20% { opacity: 0.6; }
        80% { opacity: 0.6; }
        100% { opacity: 0; transform: translateY(-30px); }
      }
      @keyframes screenGlow {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.25; }
      }
      @keyframes typing {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      .coder { animation: shake 3s ease-in-out infinite; transform-origin: 400px 350px; }
      .blink { animation: blink 1s step-end infinite; }
      .float-code { animation: floatCode 4s ease-in-out infinite; }
      .float-code-2 { animation: floatCode 4s ease-in-out infinite 1.5s; }
      .float-code-3 { animation: floatCode 4s ease-in-out infinite 3s; }
      .screen-glow { animation: screenGlow 3s ease-in-out infinite; }
      .typing { animation: typing 0.8s ease-in-out infinite; }
      .typing-2 { animation: typing 0.8s ease-in-out infinite 0.3s; }
      .typing-3 { animation: typing 0.8s ease-in-out infinite 0.6s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#0f172a" rx="20"/>
  <circle cx="650" cy="100" r="120" fill="#1e293b" opacity="0.5"/>
  <circle cx="150" cy="500" r="150" fill="#1e293b" opacity="0.3"/>

  <!-- Desk -->
  <rect x="150" y="400" width="500" height="16" rx="4" fill="#334155"/>
  <rect x="160" y="416" width="12" height="80" rx="3" fill="#475569"/>
  <rect x="628" y="416" width="12" height="80" rx="3" fill="#475569"/>

  <!-- Computer Monitor -->
  <rect x="250" y="220" width="240" height="170" rx="8" fill="#1e293b" stroke="#475569" stroke-width="3"/>
  <rect x="260" y="230" width="220" height="140" rx="4" fill="#0f172a"/>
  <!-- Screen glow -->
  <rect x="260" y="230" width="220" height="140" rx="4" fill="#22c55e" class="screen-glow"/>
  <!-- Screen code lines -->
  <rect x="275" y="250" width="100" height="4" rx="2" fill="#22c55e" opacity="0.8"/>
  <rect x="275" y="265" width="140" height="4" rx="2" fill="#22c55e" opacity="0.6"/>
  <rect x="290" y="280" width="80" height="4" rx="2" fill="#22c55e" opacity="0.7"/>
  <rect x="275" y="295" width="160" height="4" rx="2" fill="#22c55e" opacity="0.5"/>
  <rect x="290" y="310" width="120" height="4" rx="2" fill="#22c55e" opacity="0.6"/>
  <rect x="275" y="325" width="90" height="4" rx="2" fill="#22c55e" opacity="0.7"/>
  <!-- Blinking cursor on screen -->
  <rect x="367" y="325" width="3" height="4" fill="#22c55e" class="blink"/>
  <!-- Monitor stand -->
  <rect x="340" y="390" width="60" height="10" rx="3" fill="#475569"/>
  <rect x="365" y="380" width="10" height="15" rx="2" fill="#475569"/>

  <!-- Floating code around screen -->
  <text x="230" y="210" fill="#22c55e" font-size="12" font-family="monospace" opacity="0.4" class="float-code">{ }</text>
  <text x="510" y="240" fill="#22c55e" font-size="12" font-family="monospace" opacity="0.4" class="float-code-2">&lt;/&gt;</text>
  <text x="240" y="320" fill="#22c55e" font-size="10" font-family="monospace" opacity="0.3" class="float-code-3">const</text>

  <!-- Coder Body -- shaking -->
  <g class="coder">
    <!-- Body -->
    <rect x="355" y="300" width="90" height="100" rx="10" fill="#2563eb"/>
    <!-- Neck -->
    <rect x="385" y="280" width="30" height="25" rx="5" fill="#fcd34d"/>
    <!-- Head -->
    <ellipse cx="400" cy="265" rx="40" ry="38" fill="#fcd34d"/>
    <!-- Hair -->
    <path d="M360 255 Q360 225 400 220 Q440 225 440 255" fill="#1e293b"/>
    <path d="M360 255 Q355 240 370 230" fill="#1e293b"/>
    <path d="M440 255 Q445 240 430 230" fill="#1e293b"/>
    <!-- Eyes -->
    <ellipse cx="387" cy="262" rx="4" ry="4" fill="#1e293b"/>
    <ellipse cx="413" cy="262" rx="4" ry="4" fill="#1e293b"/>
    <!-- Eyes shine -->
    <circle cx="389" cy="260" r="1.5" fill="white"/>
    <circle cx="415" cy="260" r="1.5" fill="white"/>
    <!-- Smile -->
    <path d="M392 278 Q400 285 408 278" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Glasses -->
    <rect x="381" y="256" width="14" height="12" rx="3" fill="none" stroke="#475569" stroke-width="1.5"/>
    <rect x="405" y="256" width="14" height="12" rx="3" fill="none" stroke="#475569" stroke-width="1.5"/>
    <line x1="395" y1="262" x2="405" y2="262" stroke="#475569" stroke-width="1.5"/>
    <!-- Arms -->
    <!-- Left arm reaching to keyboard -->
    <path d="M355 330 Q320 370 300 380" stroke="#fcd34d" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- Right arm reaching to keyboard -->
    <path d="M445 330 Q480 370 500 380" stroke="#fcd34d" stroke-width="14" fill="none" stroke-linecap="round"/>

    <!-- Hands -->
    <circle cx="300" cy="382" r="9" fill="#fcd34d"/>
    <circle cx="500" cy="382" r="9" fill="#fcd34d"/>
  </g>

  <!-- Keyboard area -->
  <rect x="265" y="370" width="270" height="35" rx="5" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <!-- Keyboard keys -->
  <g opacity="0.6">
    <rect x="275" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="287" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="299" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="311" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="323" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="335" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="347" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="359" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="371" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="383" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="395" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="407" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="419" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="431" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="443" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="455" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="467" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="479" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <rect x="491" y="377" width="8" height="5" rx="1" fill="#64748b"/>
    <!-- Spacebar -->
    <rect x="320" y="386" width="100" height="5" rx="1" fill="#64748b"/>
  </g>

  <!-- Typing indicators on home row -->
  <rect x="335" y="377" width="6" height="4" rx="1" fill="#22c55e" class="typing"/>
  <rect x="371" y="377" width="6" height="4" rx="1" fill="#22c55e" class="typing-2"/>
  <rect x="443" y="377" width="6" height="4" rx="1" fill="#22c55e" class="typing-3"/>

  <!-- Coffee cup -->
  <g class="coder">
    <rect x="530" y="365" width="25" height="30" rx="4" fill="#475569"/>
    <path d="M555 370 Q568 370 568 380 Q568 390 555 390" stroke="#475569" stroke-width="3" fill="none"/>
    <ellipse cx="542" cy="365" rx="12" ry="3" fill="#1e293b"/>
    <!-- Steam -->
    <path d="M538 358 Q536 350 540 344" stroke="#64748b" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M544 356 Q546 348 542 340" stroke="#64748b" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- Chair -->
  <rect x="345" y="490" width="110" height="12" rx="4" fill="#475569"/>
  <rect x="340" y="500" width="120" height="8" rx="3" fill="#334155"/>
  <!-- Chair back -->
  <rect x="345" y="410" width="12" height="85" rx="4" fill="#475569"/>

  <!-- Floor -->
  <rect x="0" y="530" width="800" height="70" fill="#1e293b"/>
  <rect x="0" y="530" width="800" height="3" fill="#334155"/>
</svg>
